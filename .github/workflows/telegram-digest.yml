name: RecruitRadar-IL digest

# Runs the scoring pipeline in the cloud (no laptop needed) and delivers the
# new-leads CSV to your Telegram chat. Free for public repositories.
#
# Two ways it fires:
#   * schedule   - automatically, twice a day (12:00 and 20:00 Israel time)
#   * manually   - the "Run workflow" button on the Actions tab, which also
#                  works from the GitHub mobile app
#
# Required repository secret:  TELEGRAM_BOT_TOKEN
# Recommended repository secret: BOT_OWNER_ID (your Telegram chat id)
# (Settings -> Secrets and variables -> Actions -> New repository secret)

on:
  schedule:
    # cron is in UTC. 09:00 and 17:00 UTC = 12:00 and 20:00 Israel (UTC+3, DST).
    # In winter (UTC+2) these shift to 11:00 and 19:00 Israel time.
    - cron: "0 9,17 * * *"
  workflow_dispatch:
    inputs:
      reset_sent:
        description: "Wipe sent_leads before delivering (re-ships every currently-flagged lead). Leave false for the normal 'only new since last digest' behavior."
        type: boolean
        default: false

# Don't let two runs overlap (they share the same DB cache).
concurrency:
  group: recruitradar-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: RecruitRadarIL
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Persist the SQLite store (and metrics) between runs. This is a private,
      # best-effort cache - it is NEVER committed to the public repo, so
      # collected message text does not leak. A cache miss just means the
      # digest runs on whatever the current collection step produces.
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: RecruitRadarIL/data
          key: recruitradar-data-${{ github.run_id }}
          restore-keys: |
            recruitradar-data-

      # data/verdicts.jsonl is tracked in the repo (the analyst feedback loop -
      # LF4). If a stale cache overwrote it during restore, snap it back to
      # whatever the current commit has. `git checkout HEAD -- ...` is a no-op
      # when the cache did not contain the file, so this is safe either way.
      - name: Ensure repo verdicts.jsonl wins over cache
        run: git checkout HEAD -- data/verdicts.jsonl

      # Report which secrets actually reached the runner. GitHub auto-redacts
      # secret values in logs, so we deliberately only print lengths - never
      # content. This makes "the secret is set but wrong / in the wrong tab"
      # visible from the Actions log alone.
      - name: Diagnose secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BOT_OWNER_ID: ${{ secrets.BOT_OWNER_ID }}
          HASH_SALT: ${{ secrets.HASH_SALT }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELETHON_SESSION: ${{ secrets.TELETHON_SESSION }}
        run: |
          for var in TELEGRAM_BOT_TOKEN BOT_OWNER_ID HASH_SALT \
                    TELEGRAM_API_ID TELEGRAM_API_HASH TELETHON_SESSION; do
            value="${!var}"
            if [ -z "$value" ]; then
              echo "  $var: MISSING"
            else
              echo "  $var: set (${#value} chars)"
            fi
          done

      - name: Install dependencies
        # Light set only - fast and enough for scoring. Snorkel/torch are
        # optional; pipeline.py falls back to a weighted vote without them.
        # Telethon powers the optional headless collector.
        # deep-translator ships the digest with a Hebrew translation of
        # Russian rows (uses Google Translate's public endpoint).
        run: pip install --quiet pandas numpy scikit-learn requests matplotlib telethon deep-translator openpyxl

      - name: Collect fresh messages (optional)
        # Runs only meaningfully when the three Telegram-user secrets are set;
        # otherwise it self-skips and the digest scores whatever the cache has.
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELETHON_SESSION: ${{ secrets.TELETHON_SESSION }}
          HASH_SALT: ${{ secrets.HASH_SALT }}
        run: python agent/collect_headless.py

      - name: Run scan and deliver digest to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BOT_OWNER_ID: ${{ secrets.BOT_OWNER_ID }}
          HASH_SALT: ${{ secrets.HASH_SALT }}
          # Present + non-empty = wipe sent_leads before scoring. Only settable
          # from a manual "Run workflow" dispatch, so scheduled runs are never
          # accidentally forced to re-ship the whole backlog.
          RESET_SENT_LEADS: ${{ inputs.reset_sent && '1' || '' }}
        run: python agent/cloud_digest.py
